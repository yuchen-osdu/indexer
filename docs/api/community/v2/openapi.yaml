openapi: 3.1.0
info:
  title: Indexer Service
  description: "Indexer service creates an index, which is a methodical arrangement\
    \ of records designed to enable users to locate information quickly."
  contact:
    name: OSDU Data Platform Team
    email: dps@OSDU.org
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: "2.0"
servers:
- url: /api/indexer/v2
security:
- Authorization: []
tags:
- name: partition-setup-api
  description: Partition Setup API
- name: reindex-api
  description: Reindex API
- name: health-check-api
  description: Health Check API
- name: cleanup-indicies-api
  description: Cleanup Indicies API
- name: info
  description: Version info endpoint
paths:
  /partitions/provision:
    put:
      tags:
      - partition-setup-api
      summary: Provision partition
      description: "Provision partition. Required roles: `users.datalake.ops`"
      operationId: provisionPartition
      parameters:
      - name: data-partition-id
        in: header
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "403":
          description: User not authorized to perform the action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
      - Authorization: []
  /reindex:
    post:
      tags:
      - reindex-api
      summary: Re-index given 'kind'
      description: "This API allows users to re-index a 'kind' without re-ingesting\
        \ the records via storage API. Required roles: `service.search.admin`"
      operationId: reindex
      parameters:
      - name: force_clean
        in: query
        description: Force Clean
        required: false
        schema:
          type: boolean
          default: false
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordReindexRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "403":
          description: User not authorized to perform the action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
      - Authorization: []
    patch:
      tags:
      - reindex-api
      summary: Full Re-index by data partition
      description: "This API allows users to re-index an entire partition without\
        \ re-ingesting the records via storage API.Required roles: `users.datalake.ops`"
      operationId: fullReindex
      parameters:
      - name: force_clean
        in: query
        description: Force Clean
        required: false
        schema:
          type: boolean
          default: false
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "403":
          description: User not authorized to perform the action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
      - Authorization: []
  /reindex/records:
    post:
      tags:
      - reindex-api
      summary: Re-index given records
      description: "This API allows users to re-index the given records by providing\
        \ record ids without re-ingesting the records via storage API. Required roles:\
        \ `service.search.admin`"
      operationId: reindexRecords
      parameters:
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReindexRecordsRequest"
        required: true
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "403":
          description: User not authorized to perform the action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
      - Authorization: []
  /readiness_check:
    get:
      tags:
      - health-check-api
      summary: Readiness Check endpoint
      description: For deployment available public `/readiness_check` endpoint.
      operationId: readinessCheck
      parameters:
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
  /liveness_check:
    get:
      tags:
      - health-check-api
      summary: Liveness Check endpoint
      description: For deployment available public `/liveness_check` endpoint.
      operationId: livenessCheck
      parameters:
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
  /info:
    get:
      tags:
      - info
      summary: Version info
      description: "For deployment available public `/info` endpoint, which provides\
        \ build and git related information."
      operationId: info
      parameters:
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Version info.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionInfo"
  /index:
    delete:
      tags:
      - cleanup-indicies-api
      summary: Delete Index for the given kind
      description: "Delete Index for the given kind. Required roles: `users.datalake.ops`"
      operationId: deleteIndex
      parameters:
      - name: kind
        in: query
        description: Kind
        required: true
        schema:
          type: string
          minLength: 1
        example: tenant1:public:well:1.0.2
      - name: data-partition-id
        in: header
        description: Tenant Id
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "403":
          description: User not authorized to perform the action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "502":
          description: Bad Gateway
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
        "503":
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppError"
      security:
      - Authorization: []
components:
  schemas:
    AppError:
      type: object
      description: Standard error response returned by OSDU services.
      properties:
        code:
          type: integer
          format: int32
          description: HTTP status code.
          example: 400
        reason:
          type: string
          description: Short error reason.
          example: Bad Request
        message:
          type: string
          description: Detailed error message.
          example: Invalid record format.
    RecordReindexRequest:
      type: object
      properties:
        kind:
          type: string
        cursor:
          type: string
    ReindexRecordsRequest:
      type: object
      description: Request body for re-indexing specific records by their IDs.
      properties:
        recordIds:
          type: array
          description: List of record IDs to re-index. Between 1 and 1000 entries.
          example:
          - tenant1:public:well:1.0.2
          items:
            type: string
            minLength: 1
          maxItems: 1000
          minItems: 1
      required:
      - recordIds
    ConnectedOuterService:
      type: object
      description: Name and version of an external service that this OSDU service
        connects to.
      properties:
        name:
          type: string
          description: Name of the connected external service.
          example: storage
        version:
          type: string
          description: Version of the connected external service.
          example: 2.0.0
    FeatureFlagState:
      type: object
      description: State of a feature flag for a given partition and source.
      properties:
        name:
          type: string
          description: Name of the feature flag.
          example: collaborations-api
        enabled:
          type: boolean
          description: Whether the feature flag is currently enabled.
          example: true
        partition:
          type: string
          description: Data partition this flag applies to.
          example: opendes
        source:
          type: string
          description: Source configuration that provided this flag state.
          example: runtime
    VersionInfo:
      type: object
      description: Version and build information for an OSDU service.
      properties:
        groupId:
          type: string
          description: Maven group ID of the service artifact.
          example: org.opengroup.osdu
        artifactId:
          type: string
          description: Maven artifact ID of the service.
          example: os-search
        version:
          type: string
          description: Semantic version of the deployed service.
          example: 0.27.0
        buildTime:
          type: string
          description: ISO 8601 timestamp of the build.
          example: 2021-01-26T02:24:13.843Z
        branch:
          type: string
          description: Source control branch from which the service was built.
          example: main
        commitId:
          type: string
          description: Short commit SHA of the build.
          example: "7777777"
        commitMessage:
          type: string
          description: Commit message of the build.
          example: initial commit
        connectedOuterServices:
          type: array
          description: List of external services this service depends on.
          items:
            $ref: "#/components/schemas/ConnectedOuterService"
        featureFlagStates:
          type: array
          description: "Current feature flag states for this partition, if any."
          items:
            $ref: "#/components/schemas/FeatureFlagState"
  securitySchemes:
    Authorization:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: Authorization
