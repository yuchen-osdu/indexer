# Set the default logging level to WARNING to suppress INFO logs
.level=WARNING

# Console handler configuration
handlers=java.util.logging.ConsoleHandler
java.util.logging.ConsoleHandler.level=WARNING
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# Simple format pattern - just time and message
java.util.logging.SimpleFormatter.format=%1$tT %4$s: %5$s%n

# Suppress specific noisy loggers
org.opengroup.osdu.util.level=WARNING
org.opengroup.osdu.common.level=WARNING
org.opengroup.osdu.models.level=WARNING
org.apache.http.level=WARNING
org.springframework.level=WARNING

# Keep Cucumber output visible (if it uses JUL)
io.cucumber.level=INFO
